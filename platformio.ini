; HINWEIS: Dies ist eine reine Bibliothek, kein eigenstaendiges Projekt.
; IntelliSense-Fehler wie "AsyncTCP.h nicht gefunden" oder "AsyncClient
; ist nicht definiert" sind NORMAL und koennen ignoriert werden.
; Die Abhaengigkeit (AsyncTCP) wird erst im einbindenden Projekt
; (z.B. Fingerscanner) aufgeloest und kompiliert.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

build_flags = 
    -std=c++17
    -DARDUINO_ESP32_DEV

build_src_filter = +<*> -<examples/>
